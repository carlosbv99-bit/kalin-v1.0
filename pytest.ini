[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --maxfail=5
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires dependencies)
    slow: Tests that take longer than 1 second
    llm: Tests that require LLM providers
    web: Tests for web endpoints
