name: Kalin CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # TEST - Ejecutar tests unitarios
  # ============================================
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=agent --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

  # ============================================
  # LINT - Análisis de código estático
  # ============================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pylint mypy
    
    - name: Run Flake8
      run: |
        flake8 agent/ web.py main.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # E9,F63,F7,F82 son errores críticos de sintaxis
    
    - name: Run Black (check only)
      run: |
        black --check agent/ web.py main.py || echo "Black formatting issues found"
    
    - name: Run Pylint
      run: |
        pylint agent/core/ --exit-zero --disable=C,R,W || echo "Pylint warnings found"
    
    - name: Run MyPy (type checking)
      run: |
        mypy agent/core/ --ignore-missing-imports || echo "Type checking warnings found"

  # ============================================
  # SECURITY - Escaneo de seguridad
  # ============================================
  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run Bandit (security linting)
      run: |
        bandit -r agent/ -f json -o bandit-report.json || true
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check --json --output safety-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # ============================================
  # BUILD - Construir y validar aplicación
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate application can start
      run: |
        timeout 10 python -c "from web import app; print('App imports successfully')" || echo "Startup validation completed"
    
    - name: Check critical files exist
      run: |
        test -f main.py && echo "✅ main.py exists"
        test -f web.py && echo "✅ web.py exists"
        test -f requirements.txt && echo "✅ requirements.txt exists"
        test -d agent/ && echo "✅ agent/ directory exists"
        test -d static/ && echo "✅ static/ directory exists"
        test -d templates/ && echo "✅ templates/ directory exists"

  # ============================================
  # DOCKER - Construir imagen Docker
  # ============================================
  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.ref == 'refs/heads/main'
    
    - name: Build Docker image
      run: |
        docker build -t kalin-ai:${{ github.sha }} .
        docker tag kalin-ai:${{ github.sha }} kalin-ai:latest
    
    - name: Push Docker image
      run: |
        docker push kalin-ai:${{ github.sha }}
        docker push kalin-ai:latest
      if: github.ref == 'refs/heads/main'

  # ============================================
  # DEPLOY - Despliegue automático (opcional)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: [docker, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy notification
      run: |
        echo "🚀 Deployment ready!"
        echo "SHA: ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"
        echo "Actor: ${{ github.actor }}"
    
