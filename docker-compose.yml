version: '3.8'

services:
  kalin:
    build: .
    container_name: kalin
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"  # Solo localhost, NO exponer públicamente
    volumes:
      - ./logs:/app/logs
      - ./sessions:/app/sessions
      - ./cache:/app/cache
      - ./plugins:/app/plugins
      - ./proyectos:/app/proyectos  # Monta tus proyectos aquí
    environment:
      - KALIN_MODE=${KALIN_MODE:-local}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=0
      # API Keys (opcional, usa secrets en producción)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    networks:
      - kalin-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Opcional: Redis para Celery (task queue)
  redis:
    image: redis:7-alpine
    container_name: kalin-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - kalin-network
    command: redis-server --appendonly yes

networks:
  kalin-network:
    driver: bridge

volumes:
  redis-data:
