<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalin AI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #000000;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        padding: 12px 16px;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 32px;
        height: 32px;
        background: #10a37f;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
      }

      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .messages-container {
        max-width: 768px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 18px;
        line-height: 1.5;
      }

      .message.user {
        background: #f3f3f3;
        align-self: flex-end;
        margin-left: auto;
      }

      .message.bot {
        background: #ffffff;
        align-self: flex-start;
      }

      .input-container {
        padding: 20px;
        border-top: 1px solid #e5e5e5;
      }

      .input-wrapper {
        max-width: 768px;
        margin: 0 auto;
      }

      .input-box {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        border: 1px solid #e5e5e5;
        border-radius: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      #input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 15px;
      }

      .btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-send {
        background: #000000;
        color: #ffffff;
      }

      .btn-send:disabled {
        background: #e5e5e5;
        color: #8e8ea0;
        cursor: not-allowed;
      }

      .btn-mic {
        background: transparent;
        color: #6e6e80;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <div class="logo">K</div>
      <span style="font-weight: 600">Kalin</span>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="messages-container" id="messages"></div>
    </div>

    <div class="input-container">
      <div class="input-wrapper">
        <div class="input-box">
          <input
            type="text"
            id="input"
            placeholder="Envía un mensaje a Kalin"
            onkeypress="handleKeyPress(event)"
          />
          <button class="btn btn-mic" onclick="toggleMic()" id="mic-btn">
            🎤
          </button>
          <button class="btn btn-send" onclick="sendMessage()" id="send-btn">
            ↑
          </button>
        </div>
      </div>
    </div>

    <script>
      var recognition = null;
      var isRecording = false;

      if (
        "webkitSpeechRecognition" in window ||
        "SpeechRecognition" in window
      ) {
        var SpeechRecognition =
          window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = "es-ES";
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = function (event) {
          var transcript = event.results[0][0].transcript;
          var input = document.getElementById("input");
          input.value = transcript;
          stopRecording();
          updateButton();
        };

        recognition.onerror = function (event) {
          console.error("Error de voz:", event.error);
          stopRecording();
        };

        recognition.onend = function () {
          stopRecording();
        };
      } else {
        document.getElementById("mic-btn").style.display = "none";
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") {
          sendMessage();
        }
      }

      function sendMessage() {
        var input = document.getElementById("input");
        var message = input.value.trim();

        if (!message) {
          return;
        }

        addMessage(message, "user");
        input.value = "";
        updateButton();

        // Usar ruta relativa en lugar de URL absoluta para evitar problemas de CORS
        fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ mensaje: message }),
        })
          .then(function (response) {
            return response.json();
          })
          .then(function (data) {
            var text = data.respuesta || "Sin respuesta";
            addMessage(text, "bot");
          })
          .catch(function (error) {
            addMessage("Error: " + error.message, "bot");
          });
      }

      function addMessage(text, sender) {
        var container = document.getElementById("messages");
        var div = document.createElement("div");
        div.className = "message " + sender;
        div.textContent = text;
        container.appendChild(div);

        var chatArea = document.getElementById("chat-area");
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function updateButton() {
        var input = document.getElementById("input");
        var btn = document.getElementById("send-btn");
        btn.disabled = !input.value.trim();
      }

      function toggleMic() {
        if (!recognition) {
          alert(
            "Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.",
          );
          return;
        }

        if (isRecording) {
          recognition.stop();
        } else {
          recognition.start();
          startRecording();
        }
      }

      function startRecording() {
        isRecording = true;
        var btn = document.getElementById("mic-btn");
        btn.style.background = "#ef4444";
        btn.style.color = "#ffffff";
        btn.innerHTML = "⏹";
      }

      function stopRecording() {
        isRecording = false;
        var btn = document.getElementById("mic-btn");
        btn.style.background = "transparent";
        btn.style.color = "#6e6e80";
        btn.innerHTML = "🎤";
      }

      document.getElementById("input").addEventListener("input", updateButton);
      updateButton();
    </script>
  </body>
</html>
